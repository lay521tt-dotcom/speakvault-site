<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SpeakVault social preview</title>
  <desc id="desc">SpeakVault is a personal English study workspace for listening, shadowing, scenario cards, and a phrase vault.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eadfda"/>
      <stop offset="0.52" stop-color="#c99f9a"/>
      <stop offset="1" stop-color="#a7b2bd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#4a3938" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="28" fill="#fffaf6" opacity="0.94" filter="url(#shadow)"/>
  <rect x="70" y="70" width="1060" height="76" rx="28" fill="#756a75"/>
  <circle cx="118" cy="108" r="10" fill="#c99f9a"/>
  <circle cx="152" cy="108" r="10" fill="#eadfda"/>
  <circle cx="186" cy="108" r="10" fill="#a7b2bd"/>
  <text x="234" y="118" fill="#fffaf6" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">SpeakVault</text>
  <text x="116" y="223" fill="#9f6f70" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="4">INTENSIVE LISTENING WORKSPACE</text>
  <text x="116" y="306" fill="#332f30" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900">Listen, shadow,</text>
  <text x="116" y="386" fill="#332f30" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900">and keep useful lines.</text>
  <rect x="760" y="220" width="310" height="96" rx="18" fill="#ffffff" stroke="#dacdc8"/>
  <text x="792" y="260" fill="#9f6f70" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Chinese thought</text>
  <text x="792" y="296" fill="#332f30" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">我觉得可以先试一下。</text>
  <rect x="760" y="344" width="310" height="126" rx="18" fill="#8e6e77"/>
  <text x="792" y="386" fill="#f0ddda" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Shadowing line</text>
  <text x="792" y="430" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">I think it is worth</text>
  <text x="792" y="464" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">testing first.</text>
  <text x="116" y="492" fill="#746f70" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Dictation · Hidden subtitles · Phrase vault</text>
</svg>
