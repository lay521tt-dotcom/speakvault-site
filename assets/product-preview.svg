<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">SpeakVault product preview</title>
  <desc id="desc">A desktop-style preview showing a Chinese thought becoming natural English and practice feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10221f"/>
      <stop offset="0.52" stop-color="#2f6f68"/>
      <stop offset="1" stop-color="#f1d8c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#071512" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1440" height="960" fill="url(#bg)"/>
  <rect x="94" y="88" width="1252" height="736" rx="24" fill="#fbfaf8" opacity="0.94" filter="url(#shadow)"/>
  <rect x="94" y="88" width="1252" height="72" rx="24" fill="#17211f"/>
  <circle cx="142" cy="124" r="10" fill="#d77b5a"/>
  <circle cx="176" cy="124" r="10" fill="#e9bf62"/>
  <circle cx="210" cy="124" r="10" fill="#73bfa8"/>
  <text x="262" y="132" fill="#f7f1ea" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">SpeakVault workspace</text>
  <rect x="138" y="210" width="354" height="548" rx="18" fill="#ffffff" stroke="#ddd3c8"/>
  <text x="172" y="260" fill="#2f6f68" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Chinese thought</text>
  <text x="172" y="320" fill="#282421" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">我不是很确定这个方案</text>
  <text x="172" y="364" fill="#282421" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">是不是最优的。</text>
  <rect x="172" y="432" width="234" height="56" rx="12" fill="#1f2422"/>
  <text x="210" y="469" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Generate</text>
  <rect x="544" y="210" width="758" height="172" rx="18" fill="#ffffff" stroke="#ddd3c8"/>
  <text x="584" y="258" fill="#a15c38" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Natural English</text>
  <text x="584" y="310" fill="#282421" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">I’m not completely sure this is the best approach,</text>
  <text x="584" y="354" fill="#282421" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">but I think it’s worth trialling first.</text>
  <rect x="544" y="414" width="370" height="344" rx="18" fill="#ffffff" stroke="#ddd3c8"/>
  <text x="584" y="466" fill="#2f6f68" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Saved vault phrase</text>
  <text x="584" y="524" fill="#5f5851" font-family="Inter, Arial, sans-serif" font-size="24">Work meeting</text>
  <text x="584" y="572" fill="#5f5851" font-family="Inter, Arial, sans-serif" font-size="24">Soft disagreement</text>
  <text x="584" y="620" fill="#5f5851" font-family="Inter, Arial, sans-serif" font-size="24">New Zealand English</text>
  <rect x="966" y="414" width="336" height="344" rx="18" fill="#17211f"/>
  <text x="1004" y="466" fill="#73d1bd" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Practice feedback</text>
  <text x="1004" y="542" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900">92</text>
  <text x="1122" y="542" fill="#c9d4d0" font-family="Inter, Arial, sans-serif" font-size="24">overall</text>
  <text x="1004" y="622" fill="#c9d4d0" font-family="Inter, Arial, sans-serif" font-size="24">Clearer stress on “approach”</text>
  <text x="1004" y="668" fill="#c9d4d0" font-family="Inter, Arial, sans-serif" font-size="24">Try one more spoken attempt</text>
</svg>
